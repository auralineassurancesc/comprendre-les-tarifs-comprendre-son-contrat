document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box;}\n    body{margin:0;background:#1B2A4D;font-family:Arial,Helvetica,sans-serif;color:#33383F;-webkit-font-smoothing:antialiased;}\n    a{color:#C2A15E;text-decoration:none;}\n    a:hover{color:#d8bd82;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"position:relative;overflow:hidden;padding:60px 24px 44px;\">\n  <div style=\"position:absolute;width:540px;height:540px;border:1px solid rgba(194,161,94,.16);border-radius:50%;top:-170px;right:-130px;pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:absolute;width:360px;height:360px;border:1px solid rgba(194,161,94,.10);border-radius:50%;top:-80px;right:20px;pointer-events:none;\"><\u002Fdiv>\n  <div style=\"max-width:1180px;margin:0 auto;position:relative;\">\n    <img src=\"b2f2f536-80a4-4ef3-a752-bebb72da592a\" alt=\"Auraline Assurances · Courtage\" style=\"width:248px;height:auto;display:block;margin-bottom:34px;\">\n    <div style=\"font-family:Arial;font-weight:700;color:#C2A15E;letter-spacing:.28em;font-size:12px;text-transform:uppercase;\">Exemples de primes · Comprendre son contrat<\u002Fdiv>\n    <h1 style=\"font-family:'EB Garamond',Georgia,serif;color:#F3F1EA;font-weight:500;font-size:clamp(32px,4.6vw,56px);line-height:1.12;margin:16px 0 0;max-width:17ch;\">Le prix ne dit pas tout. <em style=\"color:#C2A15E;\">La couverture, si.<\u002Fem><\u002Fh1>\n    <div style=\"width:56px;height:1px;background:#C2A15E;margin:26px 0;\"><\u002Fdiv>\n    <p style=\"font-family:Arial;color:rgba(243,241,234,.82);font-size:17px;line-height:1.72;max-width:62ch;margin:0;\">Auraline n'est pas un comparateur de prix. Nous cherchons la meilleure <em>solution<\u002Fem> d'assurance pour chaque client — pour ne pas se retrouver démuni le jour d'un sinistre. À profil égal, voici ce que change réellement chaque formule, produit par produit.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"background:#F3F1EA;border-top:1px solid rgba(194,161,94,.4);\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:48px 24px 56px;\">\n    <div style=\"font-family:Arial;font-weight:700;color:#C2A15E;letter-spacing:.24em;font-size:12px;text-transform:uppercase;\">01 · Le comparateur<\u002Fdiv>\n    <h2 style=\"font-family:'EB Garamond',Georgia,serif;color:#1B2A4D;font-weight:500;font-size:clamp(26px,3.2vw,38px);margin:12px 0 8px;\">Le bon niveau de garanties, produit par produit<\u002Fh2>\n    <p style=\"font-family:Arial;color:#6B7280;font-size:15px;line-height:1.6;max-width:58ch;margin:0;\">Choisissez un produit, puis un profil. Vous verrez pourquoi la prime varie — et pourquoi la formule la moins chère est rarement la mieux couverte.<\u002Fp>\n\n    <div style=\"font-family:Arial;font-weight:700;color:#9aa1ac;letter-spacing:.2em;font-size:10.5px;text-transform:uppercase;margin-top:28px;\">Vous êtes<\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;\">\n      <sc-for list=\"{{ audienceTabs }}\" as=\"a\" hint-placeholder-count=\"2\">\n        <button sc-camel-on-click=\"{{ a.select }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-family:Arial;font-weight:700;color:#9aa1ac;letter-spacing:.2em;font-size:10.5px;text-transform:uppercase;margin-top:24px;\">Le produit<\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;\">\n      <sc-for list=\"{{ products }}\" as=\"pr\" hint-placeholder-count=\"4\">\n        <button sc-camel-on-click=\"{{ pr.select }}\" style=\"{{ pr.style }}\">{{ pr.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"font-family:Arial;font-weight:700;color:#9aa1ac;letter-spacing:.2em;font-size:10.5px;text-transform:uppercase;margin-top:26px;\">Le profil<\u002Fdiv>\n    <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;\">\n      <sc-for list=\"{{ personas }}\" as=\"p\" hint-placeholder-count=\"2\">\n        <button sc-camel-on-click=\"{{ p.select }}\" style=\"{{ p.tabStyle }}\">\n          <span style=\"font-family:Arial;font-weight:700;letter-spacing:.18em;font-size:11px;text-transform:uppercase;{{ p.tagStyle }}\">{{ p.tag }}<\u002Fspan>\n          <span style=\"font-family:'EB Garamond',Georgia,serif;font-size:22px;display:block;margin-top:5px;color:inherit;\">{{ p.name }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:26px;background:#fff;border:1px solid rgba(27,42,77,.08);border-radius:5px;padding:28px;box-shadow:0 20px 45px -32px rgba(27,42,77,.55);\">\n      <div style=\"display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:flex-start;border-bottom:1px solid rgba(194,161,94,.35);padding-bottom:20px;\">\n        <div>\n          <div style=\"font-family:'EB Garamond',Georgia,serif;font-size:26px;color:#1B2A4D;\">{{ current.name }}<\u002Fdiv>\n          <div style=\"font-family:Arial;color:#6B7280;font-size:14px;margin-top:5px;\">{{ current.sub }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showPeriod }}\">\n          <div style=\"display:flex;gap:8px;\">\n            <sc-for list=\"{{ periodTabs }}\" as=\"pt\" hint-placeholder-count=\"2\">\n              <button sc-camel-on-click=\"{{ pt.select }}\" style=\"{{ pt.style }}\">{{ pt.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"font-family:Arial;font-weight:700;color:#C2A15E;letter-spacing:.2em;font-size:11px;text-transform:uppercase;margin-top:24px;\">Ce qui fait varier la prime<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;margin-top:16px;\">\n        <sc-for list=\"{{ current.factors }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <div style=\"border-left:2px solid #C2A15E;padding:2px 0 2px 15px;\">\n            <div style=\"font-family:Arial;font-weight:700;color:#1B2A4D;font-size:14px;line-height:1.35;\">{{ f.t }}<\u002Fdiv>\n            <div style=\"font-family:Arial;color:#6B7280;font-size:13px;line-height:1.55;margin-top:6px;\">{{ f.d }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ current.note }}\">\n        <div style=\"margin-top:22px;background:#F3F1EA;border-left:3px solid #C2A15E;border-radius:4px;padding:16px 18px;\">\n          <div style=\"font-family:Arial;font-weight:700;color:#1B2A4D;font-size:11px;letter-spacing:.14em;text-transform:uppercase;\">Bon à savoir<\u002Fdiv>\n          <div style=\"font-family:Arial;color:#33383F;font-size:13.5px;line-height:1.62;margin-top:7px;\">{{ current.note }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:22px;\">\n      <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;\">\n        <div style=\"font-family:Arial;font-weight:700;color:#C2A15E;letter-spacing:.2em;font-size:11px;text-transform:uppercase;\">Les formules<\u002Fdiv>\n        <div style=\"font-family:Arial;font-style:italic;color:#6B7280;font-size:12.5px;\">Montants donnés à titre d'exemple indicatif — hors devis personnalisé.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:16px;margin-top:16px;\">\n        <sc-for list=\"{{ cards }}\" as=\"card\" hint-placeholder-count=\"4\">\n          <div style=\"position:relative;background:#fff;border:1px solid rgba(27,42,77,.1);border-radius:5px;padding:22px 20px;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;\" style-hover=\"transform:translateY(-3px);box-shadow:0 22px 42px -28px rgba(27,42,77,.55);\">\n            <sc-if value=\"{{ card.isReco }}\"><div style=\"position:absolute;inset:-1px;border:2px solid #C2A15E;border-radius:6px;pointer-events:none;\"><\u002Fdiv><\u002Fsc-if>\n            <div style=\"font-family:'EB Garamond',Georgia,serif;font-size:20px;color:#1B2A4D;line-height:1.15;\">{{ card.name }}<\u002Fdiv>\n            <div style=\"font-family:Arial;color:#6B7280;font-size:12.5px;margin-top:4px;\">{{ card.desc }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:6px;margin:16px 0 2px;\">\n              <span style=\"font-family:'EB Garamond',Georgia,serif;font-size:34px;color:#C2A15E;font-weight:600;\">{{ card.price }}<\u002Fspan>\n              <span style=\"font-family:Arial;color:#6B7280;font-size:12px;\">{{ periodSuffix }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:rgba(194,161,94,.4);margin:14px 0;\"><\u002Fdiv>\n            <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;flex:1;\">\n              <sc-for list=\"{{ card.covers }}\" as=\"cov\" hint-placeholder-count=\"5\">\n                <li style=\"display:flex;gap:9px;align-items:flex-start;font-family:Arial;font-size:13px;color:#33383F;line-height:1.4;\">\n                  <sc-if value=\"{{ cov.ok }}\"><span style=\"color:#C2A15E;font-weight:700;line-height:1.4;\">✓<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ cov.opt }}\"><span style=\"color:#C2A15E;font-weight:700;line-height:1.4;\">＋<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ cov.no }}\"><span style=\"color:#B9BEC8;font-weight:700;line-height:1.4;\">✕<\u002Fspan><\u002Fsc-if>\n                  <span>{{ cov.label }}<\u002Fspan>\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n            <div style=\"margin-top:18px;{{ card.badgeStyle }}\">{{ card.badge }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:22px;background:#1B2A4D;border-radius:5px;padding:28px 30px;position:relative;overflow:hidden;\">\n      <div style=\"position:absolute;width:300px;height:300px;border:1px solid rgba(194,161,94,.14);border-radius:50%;top:-140px;right:-90px;pointer-events:none;\"><\u002Fdiv>\n      <div style=\"font-family:Arial;font-weight:700;color:#C2A15E;letter-spacing:.24em;font-size:11px;text-transform:uppercase;position:relative;\">Conseil Auraline<\u002Fdiv>\n      <p style=\"font-family:'EB Garamond',Georgia,serif;font-style:italic;color:#F3F1EA;font-size:clamp(18px,2.1vw,22px);line-height:1.5;margin:12px 0 0;max-width:70ch;position:relative;\">{{ current.conseil }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;width:520px;height:520px;border:1px solid rgba(194,161,94,.08);border-radius:50%;bottom:-220px;left:-120px;pointer-events:none;\"><\u002Fdiv>\n  <div style=\"max-width:1180px;margin:0 auto;padding:60px 24px;position:relative;\">\n    <div style=\"width:56px;height:1px;background:#C2A15E;margin-bottom:24px;\"><\u002Fdiv>\n    <h2 style=\"font-family:'EB Garamond',Georgia,serif;color:#F3F1EA;font-weight:500;font-size:clamp(28px,3.6vw,44px);line-height:1.18;margin:0;max-width:20ch;\">Payer moins cher ne veut pas dire <em style=\"color:#C2A15E;\">être bien assuré<\u002Fem>.<\u002Fh2>\n    <p style=\"font-family:Arial;color:rgba(243,241,234,.82);font-size:16px;line-height:1.72;max-width:64ch;margin:22px 0 0;\">Une prime plus basse cache souvent une garantie en moins : pas d'assistance, une franchise élevée, un plafond insuffisant, une exclusion de dernière minute. Le jour d'un sinistre, la différence se paie comptant. Notre métier de courtier, c'est de négocier pour vous un contrat au juste prix — avec toutes les garanties que vous souhaitez, et personne pour vous laisser sans solution.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:26px;margin-top:38px;\">\n      <div style=\"border-top:1px solid rgba(194,161,94,.4);padding-top:16px;\">\n        <div style=\"font-family:'EB Garamond',Georgia,serif;color:#C2A15E;font-size:30px;\">01<\u002Fdiv>\n        <div style=\"font-family:Arial;color:#F3F1EA;font-size:15px;font-weight:700;margin-top:8px;\">On analyse votre situation<\u002Fdiv>\n        <div style=\"font-family:Arial;color:rgba(243,241,234,.7);font-size:13.5px;line-height:1.6;margin-top:6px;\">Profil, biens, usage, antécédents : chaque détail pèse sur la prime et sur le risque à couvrir.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(194,161,94,.4);padding-top:16px;\">\n        <div style=\"font-family:'EB Garamond',Georgia,serif;color:#C2A15E;font-size:30px;\">02<\u002Fdiv>\n        <div style=\"font-family:Arial;color:#F3F1EA;font-size:15px;font-weight:700;margin-top:8px;\">On trouve l'assureur adapté<\u002Fdiv>\n        <div style=\"font-family:Arial;color:rgba(243,241,234,.7);font-size:13.5px;line-height:1.6;margin-top:6px;\">Nous cherchons la compagnie qui accepte votre risque au meilleur rapport garanties / prix.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(194,161,94,.4);padding-top:16px;\">\n        <div style=\"font-family:'EB Garamond',Georgia,serif;color:#C2A15E;font-size:30px;\">03<\u002Fdiv>\n        <div style=\"font-family:Arial;color:#F3F1EA;font-size:15px;font-weight:700;margin-top:8px;\">On vérifie chaque garantie<\u002Fdiv>\n        <div style=\"font-family:Arial;color:rgba(243,241,234,.7);font-size:13.5px;line-height:1.6;margin-top:6px;\">Franchises, plafonds, exclusions, assistance : tout est contrôlé avant la signature.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:40px;display:flex;flex-wrap:wrap;gap:12px 28px;align-items:center;font-family:Arial;font-size:15px;color:#F3F1EA;\">\n      <a href=\"mailto:contact@auralineassurances.fr\">contact@auralineassurances.fr<\u002Fa>\n      <span style=\"color:rgba(194,161,94,.6);\">·<\u002Fspan>\n      <a href=\"https://www.auralineassurances.fr\">www.auralineassurances.fr<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"border-top:1px solid rgba(243,241,234,.12);\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:22px 24px;font-family:Arial;font-size:12px;color:rgba(243,241,234,.5);line-height:1.6;\">Auraline Assurances · Courtage — La confiance au cœur de vos protections · 990 332 462 R.C.S. Paris · ORIAS à compléter. Montants fournis à titre d'exemple indicatif, hors devis personnalisé.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { audience: \"part\", productId: \"auto\", personaId: \"jeune\", period: \"mois\" };\n\n  fmt(n) { return n.toLocaleString(\"fr-FR\") + \" €\"; }\n  cover(label, s) { return { label, ok: s === \"ok\", opt: s === \"opt\", no: s === \"no\" }; }\n\n  products() {\n    return [\n      {\n        id: \"auto\", label: \"Auto & mobilité\", audience: \"part\",\n        formules: [\n          { id: \"tout-risque\", name: \"Tout risque\", desc: \"Couverture maximale\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Dommages tous accidents\", \"ok\"), this.cover(\"Vol, incendie, bris de glace\", \"ok\"), this.cover(\"Assistance 0 km incluse\", \"ok\"), this.cover(\"Garantie du conducteur\", \"ok\")] },\n          { id: \"tiers-assist\", name: \"Au tiers + assistance 0 km\", desc: \"Le juste équilibre\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Assistance 0 km (dépannage)\", \"ok\"), this.cover(\"Vol & incendie\", \"opt\"), this.cover(\"Bris de glace\", \"opt\"), this.cover(\"Dommages tous accidents\", \"no\")] },\n          { id: \"tiers\", name: \"Au tiers\", desc: \"Minimum légal\", tag: \"Minimum légal\",\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Dommages causés à autrui\", \"ok\"), this.cover(\"Assistance\", \"no\"), this.cover(\"Vol, incendie\", \"no\"), this.cover(\"Vos propres dommages\", \"no\")] },\n          { id: \"sans\", name: \"Au tiers sans assistance\", desc: \"Le prix le plus bas\", warn: true,\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Assistance / dépannage\", \"no\"), this.cover(\"Panne au bord de la route\", \"no\"), this.cover(\"Vol, incendie\", \"no\"), this.cover(\"Vos propres dommages\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"jeune\", tag: \"Profil A\", name: \"Jeune conducteur\", sub: \"Permis obtenu il y a 6 mois · 23 ans · citadine essence\",\n            factors: [\n              { t: \"Surprime « jeune conducteur »\", d: \"Jusqu'à +100 % la première année, puis dégressive sur 3 ans sans sinistre.\" },\n              { t: \"Aucun bonus acquis\", d: \"Coefficient de départ à 1,00 : pas d'historique pour faire baisser la prime.\" },\n              { t: \"Sinistralité statistique\", d: \"Les assureurs constatent plus d'accidents dans les premières années de conduite.\" },\n              { t: \"Pas d'antécédents\", d: \"Sans relevé d'information favorable, l'assureur applique un tarif prudent.\" },\n            ],\n            conseil: \"Sur une citadine, la formule au tiers avec assistance 0 km protège l'essentiel sans faire exploser le budget. On garde surtout une vraie assistance : une panne à 2 h du matin ne doit jamais vous laisser sur le bord de la route.\",\n            reco: \"tiers-assist\", prices: { \"tout-risque\": 185, \"tiers-assist\": 115, \"tiers\": 95, \"sans\": 78 } },\n          { id: \"sportive\", tag: \"Profil B\", name: \"20 ans · 300 chevaux\", sub: \"Permis récent · berline sportive 300 ch · valeur élevée\",\n            factors: [\n              { t: \"Conducteur de moins de 25 ans\", d: \"L'âge cumulé à un permis récent déclenche la surprime jeune conducteur.\" },\n              { t: \"Véhicule très puissant\", d: \"300 ch : prime fortement majorée, et certains assureurs refusent tout simplement le risque.\" },\n              { t: \"Coût de réparation élevé\", d: \"Pièces, main-d'œuvre et valeur du véhicule augmentent le montant des sinistres possibles.\" },\n              { t: \"Vol et sinistres graves\", d: \"Les modèles puissants sont plus ciblés par le vol et impliqués dans des sinistres coûteux.\" },\n            ],\n            conseil: \"Sur un véhicule puissant et de forte valeur, rouler « au tiers » vous expose : le moindre choc responsable reste à votre charge. Nous cherchons l'assureur qui accepte le profil et propose une tout risque réellement complète, garantie du conducteur incluse.\",\n            reco: \"tout-risque\", prices: { \"tout-risque\": 420, \"tiers-assist\": 260, \"tiers\": 220, \"sans\": 190 } },\n          { id: \"experimente\", tag: \"Profil C\", name: \"45 ans · conducteur confirmé\", sub: \"25 ans de permis · berline familiale · bonus maximal\",\n            factors: [\n              { t: \"Bonus maximal (0,50)\", d: \"Après des années sans sinistre responsable, le coefficient plafonne au plus bas et divise la prime.\" },\n              { t: \"Aucune surprime d'âge\", d: \"Profil considéré comme stable : plus de majoration liée à un permis récent.\" },\n              { t: \"Antécédents favorables\", d: \"Un relevé d'information sans accroc rassure l'assureur et tire le tarif vers le bas.\" },\n              { t: \"Véhicule raisonnable\", d: \"Une berline familiale de puissance modérée coûte moins cher à assurer qu'une sportive.\" },\n            ],\n            conseil: \"Même avec un bon bonus, le réflexe « je paie peu, donc je descends au tiers » se retourne parfois : sur une berline récente, la tout risque reste souvent le meilleur rapport protection / prix. Nous ajustons le niveau à la valeur réelle du véhicule, sans payer de garanties inutiles.\",\n            reco: \"tout-risque\", prices: { \"tout-risque\": 62, \"tiers-assist\": 44, \"tiers\": 36, \"sans\": 29 } },\n        ],\n      },\n      {\n        id: \"habitation\", label: \"Habitation\", audience: \"part\",\n        formules: [\n          { id: \"confort\", name: \"Multirisque confort\", desc: \"Protection maximale\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Responsabilité civile vie privée\", \"ok\"), this.cover(\"Incendie & dégâts des eaux\", \"ok\"), this.cover(\"Vol & vandalisme\", \"ok\"), this.cover(\"Mobilier en valeur à neuf\", \"ok\"), this.cover(\"Assistance & relogement\", \"ok\")] },\n          { id: \"equilibre\", name: \"Multirisque équilibre\", desc: \"Le bon niveau\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Incendie & dégâts des eaux\", \"ok\"), this.cover(\"Vol\", \"ok\"), this.cover(\"Assistance\", \"ok\"), this.cover(\"Valeur à neuf mobilier\", \"opt\")] },\n          { id: \"essentielle\", name: \"Formule essentielle\", desc: \"Garanties de base\", tag: \"Économique\",\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Incendie & dégâts des eaux\", \"ok\"), this.cover(\"Vol\", \"opt\"), this.cover(\"Assistance\", \"no\"), this.cover(\"Valeur à neuf mobilier\", \"no\")] },\n          { id: \"mini\", name: \"RC + incendie minimum\", desc: \"Le prix le plus bas\", warn: true,\n            covers: [this.cover(\"Responsabilité civile\", \"ok\"), this.cover(\"Incendie\", \"ok\"), this.cover(\"Dégâts des eaux\", \"no\"), this.cover(\"Vol & vandalisme\", \"no\"), this.cover(\"Assistance\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"locataire\", tag: \"Profil A\", name: \"Locataire d'un studio\", sub: \"Studio 25 m² · centre-ville · locataire\",\n            factors: [\n              { t: \"Assurance obligatoire\", d: \"En location, l'attestation d'assurance habitation est exigée dès la remise des clés.\" },\n              { t: \"Risque de dégât des eaux\", d: \"En immeuble, une fuite peut toucher les voisins : la responsabilité peut vite chiffrer.\" },\n              { t: \"Vol en zone urbaine\", d: \"La localisation en centre-ville augmente le risque de cambriolage.\" },\n              { t: \"Valeur du mobilier\", d: \"Le capital mobilier déclaré ajuste la prime — le sous-estimer, c'est être mal indemnisé.\" },\n            ],\n            conseil: \"Pour un studio, la formule équilibre suffit largement, à condition de garder l'assistance et une bonne garantie dégât des eaux — la cause n°1 de sinistre en appartement. Le minimum « RC + incendie » vous laisse sans filet sur l'essentiel.\",\n            reco: \"equilibre\", prices: { confort: 32, equilibre: 22, essentielle: 16, mini: 11 } },\n          { id: \"maison\", tag: \"Profil B\", name: \"Maison avec piscine\", sub: \"Maison 140 m² · zone à risque · piscine\",\n            factors: [\n              { t: \"Surface & dépendances\", d: \"Plus la surface et les annexes sont grandes, plus le capital à assurer est élevé.\" },\n              { t: \"Piscine & équipements\", d: \"Une piscine augmente la responsabilité civile et la valeur des biens à couvrir.\" },\n              { t: \"Zone inondable ou exposée\", d: \"Une commune classée à risque (inondation, vol) majore fortement la prime.\" },\n              { t: \"Valeur du mobilier élevée\", d: \"Électroménager, high-tech, objets de valeur : le capital mobilier grimpe vite.\" },\n            ],\n            conseil: \"Sur une maison de valeur en zone exposée, la formule confort avec mobilier en valeur à neuf et relogement se justifie pleinement. C'est le jour d'un dégât important que l'écart de garanties se voit — pas sur la ligne de la cotisation.\",\n            reco: \"confort\", prices: { confort: 78, equilibre: 55, essentielle: 40, mini: 26 } },\n        ],\n      },\n      {\n        id: \"sante\", label: \"Mutuelle santé\", audience: \"part\",\n        formules: [\n          { id: \"n4\", name: \"Niveau renforcé\", desc: \"Optique, dentaire & hospi au top\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Hospitalisation (dépassements)\", \"ok\"), this.cover(\"Optique renforcée\", \"ok\"), this.cover(\"Dentaire & implants\", \"ok\"), this.cover(\"Chambre particulière\", \"ok\"), this.cover(\"Médecines douces\", \"ok\")] },\n          { id: \"n3\", name: \"Niveau confort\", desc: \"Bon équilibre\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Hospitalisation\", \"ok\"), this.cover(\"Optique correcte\", \"ok\"), this.cover(\"Dentaire courant\", \"ok\"), this.cover(\"Chambre particulière\", \"ok\"), this.cover(\"Implants dentaires\", \"opt\")] },\n          { id: \"n2\", name: \"Niveau intermédiaire\", desc: \"Soins courants\", tag: \"Économique\",\n            covers: [this.cover(\"Hospitalisation de base\", \"ok\"), this.cover(\"Soins courants\", \"ok\"), this.cover(\"Optique\", \"opt\"), this.cover(\"Dentaire\", \"opt\"), this.cover(\"Chambre particulière\", \"no\")] },\n          { id: \"n1\", name: \"Niveau mini\", desc: \"Le prix le plus bas\", warn: true,\n            covers: [this.cover(\"Ticket modérateur\", \"ok\"), this.cover(\"Optique\", \"no\"), this.cover(\"Dentaire\", \"no\"), this.cover(\"Chambre particulière\", \"no\"), this.cover(\"Médecines douces\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"jeune-actif\", tag: \"Profil A\", name: \"Jeune actif\", sub: \"28 ans · peu de dépenses de santé\",\n            factors: [\n              { t: \"Âge\", d: \"Plus on est jeune, plus la cotisation est basse : le risque santé augmente avec l'âge.\" },\n              { t: \"Besoins optique / dentaire\", d: \"Peu de besoins aujourd'hui : inutile de sur-payer des postes que vous n'utilisez pas.\" },\n              { t: \"Secteur des praticiens\", d: \"Selon que vos médecins pratiquent ou non des dépassements, le niveau utile change.\" },\n              { t: \"Garanties choisies\", d: \"Chaque poste renforcé (hospi, optique, dentaire) fait monter la prime.\" },\n            ],\n            conseil: \"À 28 ans en bonne santé, le niveau intermédiaire couvre l'essentiel sans payer pour des postes inutilisés. Mais gardez une vraie garantie hospitalisation : c'est l'imprévu qui coûte cher, pas le rhume.\",\n            reco: \"n2\", prices: { n4: 68, n3: 48, n2: 34, n1: 22 } },\n          { id: \"famille-senior\", tag: \"Profil B\", name: \"Couple 55 ans\", sub: \"Besoins optique, dentaire & hospitalisation\",\n            factors: [\n              { t: \"Âge des assurés\", d: \"Après 50 ans, la cotisation augmente avec la fréquence attendue des soins.\" },\n              { t: \"Optique & dentaire réguliers\", d: \"Lunettes, prothèses, implants : des postes coûteux mal remboursés par la Sécu.\" },\n              { t: \"Hospitalisation\", d: \"Le besoin de chambre particulière et la prise en charge des dépassements pèsent.\" },\n              { t: \"Dépassements d'honoraires\", d: \"En secteur 2, un bon niveau évite un reste à charge important.\" },\n            ],\n            conseil: \"Pour un couple de 55 ans, le niveau confort est le vrai point d'équilibre : dentaire, optique et hospitalisation correctement couverts. Rogner sur ces postes, c'est risquer des restes à charge de plusieurs centaines d'euros.\",\n            reco: \"n3\", prices: { n4: 210, n3: 158, n2: 120, n1: 84 } },\n        ],\n      },\n      {\n        id: \"emprunteur\", label: \"Emprunteur\", audience: \"part\",\n        formules: [\n          { id: \"max\", name: \"Toutes garanties\", desc: \"Protection complète du prêt\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Décès\", \"ok\"), this.cover(\"PTIA (perte d'autonomie)\", \"ok\"), this.cover(\"ITT (arrêt de travail)\", \"ok\"), this.cover(\"IPT / IPP (invalidité)\", \"ok\"), this.cover(\"Dos & psy sans exclusion\", \"ok\")] },\n          { id: \"equilibre\", name: \"Décès + ITT + IPT\", desc: \"Le niveau exigé par la banque\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Décès\", \"ok\"), this.cover(\"PTIA\", \"ok\"), this.cover(\"ITT (arrêt de travail)\", \"ok\"), this.cover(\"IPT (invalidité totale)\", \"ok\"), this.cover(\"IPP (invalidité partielle)\", \"opt\")] },\n          { id: \"essentielle\", name: \"Décès + PTIA + ITT\", desc: \"Minimum courant\", tag: \"Économique\",\n            covers: [this.cover(\"Décès\", \"ok\"), this.cover(\"PTIA\", \"ok\"), this.cover(\"ITT\", \"ok\"), this.cover(\"IPT / invalidité\", \"opt\"), this.cover(\"Dos & psy sans exclusion\", \"no\")] },\n          { id: \"mini\", name: \"Décès + PTIA seul\", desc: \"Le prix le plus bas\", warn: true,\n            covers: [this.cover(\"Décès\", \"ok\"), this.cover(\"PTIA\", \"ok\"), this.cover(\"ITT (arrêt de travail)\", \"no\"), this.cover(\"IPT / IPP (invalidité)\", \"no\"), this.cover(\"Dos & psy\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"jeune-nf\", tag: \"Profil A\", name: \"Emprunteur 30 ans\", sub: \"Non-fumeur · cadre · prêt sur 25 ans\",\n            factors: [\n              { t: \"Âge à la souscription\", d: \"Plus on emprunte jeune, plus le taux d'assurance est faible.\" },\n              { t: \"Non-fumeur\", d: \"Ne pas fumer évite une surprime tabac qui peut doubler la cotisation.\" },\n              { t: \"Profession sans risque\", d: \"Un métier de bureau réduit le risque d'arrêt de travail ou d'invalidité.\" },\n              { t: \"Montant & durée du prêt\", d: \"Le capital emprunté et la durée déterminent le coût total de l'assurance.\" },\n            ],\n            conseil: \"Même jeune et en bonne santé, ne réduisez pas votre couverture aux seuls décès + PTIA : sans garantie arrêt de travail, une longue maladie vous laisse rembourser seul. La délégation d'assurance permet souvent mieux couvert et moins cher que le contrat de la banque.\",\n            reco: \"equilibre\", prices: { max: 32, equilibre: 22, essentielle: 16, mini: 10 } },\n          { id: \"senior-f\", tag: \"Profil B\", name: \"Emprunteur 50 ans\", sub: \"Fumeur · profession à risque · prêt en cours\",\n            factors: [\n              { t: \"Âge élevé\", d: \"Après 50 ans, le risque santé et donc le taux d'assurance augmentent nettement.\" },\n              { t: \"Tabac\", d: \"Le statut fumeur déclenche une surprime importante sur la plupart des garanties.\" },\n              { t: \"Profession ou sport à risque\", d: \"Certaines activités entraînent surprime, exclusion ou questionnaire renforcé.\" },\n              { t: \"Questionnaire de santé\", d: \"Des antécédents médicaux peuvent conduire à des exclusions à surveiller de près.\" },\n            ],\n            conseil: \"Sur ce profil, chaque garantie compte : viser au minimum Décès + ITT + IPT, et traquer les exclusions (dos, psy). Notre rôle de courtier est de trouver l'assureur qui accepte le risque avec le moins d'exclusions possible — pas juste le tarif d'appel.\",\n            reco: \"equilibre\", prices: { max: 145, equilibre: 105, essentielle: 78, mini: 52 } },\n        ],\n      },\n      {\n        id: \"gli\", label: \"Loyer impayé\", audience: \"part\",\n        formules: [\n          { id: \"complete\", name: \"GLI complète\", desc: \"Protection totale du bailleur\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Loyers impayés\", \"ok\"), this.cover(\"Dégradations locatives\", \"ok\"), this.cover(\"Frais de procédure & PJ\", \"ok\"), this.cover(\"Vacance locative\", \"ok\"), this.cover(\"Départ prématuré\", \"ok\")] },\n          { id: \"standard\", name: \"GLI standard\", desc: \"Impayés + protection juridique\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Loyers impayés\", \"ok\"), this.cover(\"Frais de procédure & PJ\", \"ok\"), this.cover(\"Dégradations locatives\", \"opt\"), this.cover(\"Vacance locative\", \"no\"), this.cover(\"Départ prématuré\", \"no\")] },\n          { id: \"essentielle\", name: \"GLI essentielle\", desc: \"Impayés plafonnés\", tag: \"Économique\",\n            covers: [this.cover(\"Loyers impayés (plafonnés)\", \"ok\"), this.cover(\"Frais de procédure\", \"opt\"), this.cover(\"Dégradations locatives\", \"no\"), this.cover(\"Vacance locative\", \"no\"), this.cover(\"Protection juridique\", \"no\")] },\n          { id: \"caution\", name: \"Caution simple\", desc: \"Aucune garantie assureur\", warn: true,\n            covers: [this.cover(\"Dépôt de garantie du locataire\", \"ok\"), this.cover(\"Loyers impayés couverts\", \"no\"), this.cover(\"Dégradations au-delà du dépôt\", \"no\"), this.cover(\"Frais de procédure\", \"no\"), this.cover(\"Vacance locative\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"studio\", tag: \"Profil A\", name: \"Bailleur d'un studio\", sub: \"Studio étudiant · loyer 550 € · locataire avec garant\",\n            factors: [\n              { t: \"Solvabilité du locataire\", d: \"L'assureur exige un taux d'effort maîtrisé (loyer ≤ ~⅓ des revenus) pour accepter le dossier.\" },\n              { t: \"Montant du loyer\", d: \"La prime est un pourcentage du loyer charges comprises : plus le loyer est haut, plus elle l'est.\" },\n              { t: \"Type de locataire\", d: \"Étudiant, CDD, indépendant : le profil influe sur le risque d'impayé perçu.\" },\n              { t: \"Étendue des garanties\", d: \"Ajouter dégradations et vacance locative augmente la couverture — et la cotisation.\" },\n            ],\n            conseil: \"La « caution simple » ne coûte rien mais ne couvre rien : un seul mois d'impayé dépasse déjà le dépôt de garantie. Sur un studio étudiant, la GLI standard sécurise vos loyers pour quelques euros par mois — c'est l'assurance de dormir tranquille.\",\n            reco: \"standard\", prices: { complete: 21, standard: 16, essentielle: 13, caution: 0 } },\n          { id: \"maison-loc\", tag: \"Profil B\", name: \"Bailleur d'une maison\", sub: \"Maison louée · loyer 1 200 € · patrimoine à protéger\",\n            factors: [\n              { t: \"Loyer élevé\", d: \"Un loyer important signifie un risque financier plus lourd en cas d'impayé prolongé.\" },\n              { t: \"Dégradations possibles\", d: \"Sur une maison, les remises en état peuvent largement dépasser le dépôt de garantie.\" },\n              { t: \"Durée de procédure\", d: \"Une expulsion peut prendre de longs mois : sans garantie, les loyers courent à vide.\" },\n              { t: \"Qualité du dossier locataire\", d: \"Justificatifs de revenus et garanties conditionnent l'acceptation et le tarif.\" },\n            ],\n            conseil: \"Sur un bien de valeur, la GLI complète (impayés + dégradations + vacance + juridique) protège l'ensemble de votre investissement. Économiser sur la garantie, c'est risquer plusieurs milliers d'euros le jour où un locataire fait défaut.\",\n            reco: \"complete\", prices: { complete: 44, standard: 34, essentielle: 27, caution: 0 } },\n        ],\n      },\n      {\n        id: \"gav\", label: \"Accidents de la vie\", audience: \"part\",\n        formules: [\n          { id: \"famille\", name: \"GAV famille étendue\", desc: \"Seuil bas, capital élevé\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Accidents domestiques & loisirs\", \"ok\"), this.cover(\"Seuil d'intervention 5 %\", \"ok\"), this.cover(\"Capital jusqu'à 1 M€\", \"ok\"), this.cover(\"Toute la famille couverte\", \"ok\"), this.cover(\"Assistance & aménagements\", \"ok\")] },\n          { id: \"confort\", name: \"GAV confort\", desc: \"Bon équilibre\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Accidents de la vie courante\", \"ok\"), this.cover(\"Seuil d'intervention 10 %\", \"ok\"), this.cover(\"Capital jusqu'à 500 k€\", \"ok\"), this.cover(\"Assistance\", \"ok\"), this.cover(\"Préjudices esthétiques & agrément\", \"opt\")] },\n          { id: \"essentielle\", name: \"GAV essentielle\", desc: \"Accidents graves\", tag: \"Économique\",\n            covers: [this.cover(\"Accidents graves\", \"ok\"), this.cover(\"Seuil d'intervention 30 %\", \"ok\"), this.cover(\"Capital limité\", \"opt\"), this.cover(\"Assistance\", \"no\"), this.cover(\"Préjudices d'agrément\", \"no\")] },\n          { id: \"sans\", name: \"Pas de GAV\", desc: \"Aucune couverture dédiée\", warn: true,\n            covers: [this.cover(\"Sécurité sociale de base\", \"ok\"), this.cover(\"Accidents sans tiers responsable\", \"no\"), this.cover(\"Perte de revenus\", \"no\"), this.cover(\"Aménagement du domicile\", \"no\"), this.cover(\"Capital invalidité\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"famille-e\", tag: \"Profil A\", name: \"Famille avec enfants\", sub: \"Couple + 2 enfants · activités & sports\",\n            factors: [\n              { t: \"Nombre de personnes couvertes\", d: \"Chaque assuré ajouté (conjoint, enfants) élargit la protection et ajuste la prime.\" },\n              { t: \"Seuil d'intervention (AIPP)\", d: \"Un seuil bas (5 %) indemnise dès les séquelles légères — plus protecteur, plus cher.\" },\n              { t: \"Capital garanti\", d: \"Le montant maximal d'indemnisation en cas d'invalidité fait varier la cotisation.\" },\n              { t: \"Activités & sports\", d: \"Loisirs sportifs et vie active augmentent le risque d'accident couvert.\" },\n            ],\n            conseil: \"La GAV couvre ce qu'aucune autre assurance ne prend : l'accident de la vie courante sans tiers responsable. Avec des enfants, un seuil d'intervention bas et un capital élevé font toute la différence le jour où ça compte vraiment.\",\n            reco: \"famille\", prices: { famille: 26, confort: 19, essentielle: 12, sans: 0 } },\n          { id: \"solo\", tag: \"Profil B\", name: \"Personne seule active\", sub: \"Actif · vie autonome · revenus à protéger\",\n            factors: [\n              { t: \"Revenus à protéger\", d: \"En cas d'invalidité, la GAV compense une perte de revenus non couverte ailleurs.\" },\n              { t: \"Vie autonome\", d: \"Seul, un accident invalidant impose souvent d'aménager le logement à ses frais.\" },\n              { t: \"Seuil et capital choisis\", d: \"Le niveau de séquelles indemnisé et le capital ajustent directement la prime.\" },\n              { t: \"Âge et état de santé\", d: \"Ils entrent dans l'évaluation du risque au moment de la souscription.\" },\n            ],\n            conseil: \"Même seul et en bonne santé, un accident domestique peut bouleverser votre autonomie financière. La formule confort offre un bon capital et une vraie assistance sans surpayer les options destinées aux familles nombreuses.\",\n            reco: \"confort\", prices: { famille: 16, confort: 11, essentielle: 7, sans: 0 } },\n        ],\n      },\n      {\n        id: \"pj\", label: \"Protection juridique\", audience: \"part\",\n        formules: [\n          { id: \"etendue\", name: \"PJ étendue\", desc: \"Tous domaines, plafonds élevés\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Consommation & habitation\", \"ok\"), this.cover(\"Travail & administration\", \"ok\"), this.cover(\"Seuil de litige bas\", \"ok\"), this.cover(\"Plafond de prise en charge élevé\", \"ok\"), this.cover(\"Prise en charge des honoraires d'avocat\", \"ok\")] },\n          { id: \"courante\", name: \"PJ vie privée\", desc: \"Litiges du quotidien\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Consommation & habitation\", \"ok\"), this.cover(\"Voisinage & services\", \"ok\"), this.cover(\"Travail & administration\", \"opt\"), this.cover(\"Honoraires d'avocat\", \"ok\"), this.cover(\"Plafond élevé\", \"opt\")] },\n          { id: \"essentielle\", name: \"PJ essentielle\", desc: \"Conso & habitation\", tag: \"Économique\",\n            covers: [this.cover(\"Consommation\", \"ok\"), this.cover(\"Habitation\", \"ok\"), this.cover(\"Travail & administration\", \"no\"), this.cover(\"Plafond réduit\", \"opt\"), this.cover(\"Délai de carence\", \"no\")] },\n          { id: \"incluse\", name: \"Clause incluse ailleurs\", desc: \"Bribes dans un autre contrat\", warn: true,\n            covers: [this.cover(\"Défense pénale hiver : des garanties spécifiques sont indispensables.\" },\n              { t: \"Plafonds & franchises\", d: \"Des plafonds élevés et de faibles franchises font la vraie différence à l'étranger.\" },\n            ],\n            conseil: \"Hors Europe, ne transigez pas sur les frais médicaux et le rapatriement : c'est là que les montants explosent. La formule premium, avec plafonds élevés et couverture des activités, est le seul choix vraiment serein.\",\n            reco: \"premium\", prices: { premium: 130, confort: 90, essentielle: 55, carte: 0 } },\n        ],\n      },\n      {\n        id: \"rcpro\", label: \"RC & multirisque pro\", audience: \"pro\",\n        formules: [\n          { id: \"multi\", name: \"Multirisque pro complète\", desc: \"Activité, local & exploitation\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Responsabilité civile professionnelle\", \"ok\"), this.cover(\"Local & matériel\", \"ok\"), this.cover(\"Marchandises & stock\", \"ok\"), this.cover(\"Pertes d'exploitation\", \"ok\"), this.cover(\"Protection juridique pro\", \"ok\")] },\n          { id: \"rc-local\", name: \"RC pro + local\", desc: \"Activité & locaux\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Responsabilité civile professionnelle\", \"ok\"), this.cover(\"Local & matériel\", \"ok\"), this.cover(\"Marchandises & stock\", \"opt\"), this.cover(\"Pertes d'exploitation\", \"no\"), this.cover(\"Protection juridique\", \"opt\")] },\n          { id: \"rc-seule\", name: \"RC pro seule\", desc: \"Couverture de l'activité\", tag: \"Économique\",\n            covers: [this.cover(\"Responsabilité civile professionnelle\", \"ok\"), this.cover(\"Dommages causés aux tiers\", \"ok\"), this.cover(\"Local & matériel\", \"no\"), this.cover(\"Pertes d'exploitation\", \"no\"), this.cover(\"Protection juridique\", \"no\")] },\n          { id: \"mini\", name: \"RC minimale\", desc: \"Sans pertes d'exploitation\", warn: true,\n            covers: [this.cover(\"Re ttractivité employeur\", d: \"Une bonne couverture santé/prévoyance devient un argument de recrutement.\" },\n              { t: \"Obligations de branche\", d: \"Les accords collectifs peuvent imposer des garanties prévoyance renforcées.\" },\n            ],\n            conseil: \"Sur une PME, la couverture collective est autant un outil RH qu'une obligation. La formule renforcée, bien négociée, améliore la marque employeur sans dérive de coût — c'est là qu'un courtier fait la différence.\",\n            note: \"Le montant affiché est un forfait mutuelle (santé) + prévoyance, exprimé par salarié et par mois — pas pour toute l'équipe. Sur la part santé, l'employeur doit financer au moins 50 % de la cotisation (obligation légale) ; le reste est prélevé sur la fiche de paie du salarié. La prévoyance peut être prise en charge en tout ou partie par l'employeur selon la convention collective.\",\n            reco: \"renforcee\", prices: { renforcee: 55, standard: 38, socle: 26, mini: 19 } },\n        ],\n      },\n      {\n        id: \"decennale\", label: \"RC décennale\", audience: \"pro\",\n        formules: [\n          { id: \"complete\", name: \"Décennale + RC + PJ\", desc: \"Protection complète du chantier\", tag: \"Le plus protecteur\",\n            covers: [this.cover(\"Garantie décennale\", \"ok\"), this.cover(\"RC pro & chantier\", \"ok\"), this.cover(\"Dommages aux existants\", \"ok\"), this.cover(\"Protection juridique\", \"ok\"), this.cover(\"Toutes activités déclarées\", \"ok\")] },\n          { id: \"deca-rc\", name: \"Décennale + RC pro\", desc: \"Obligation + activité\", tag: \"Bon compromis\",\n            covers: [this.cover(\"Garantie décennale\", \"ok\"), this.cover(\"RC pro & chantier\", \"ok\"), this.cover(\"Dommages aux existants\", \"opt\"), this.cover(\"Protection juridique\", \"opt\"), this.cover(\"Activités principales\", \"ok\")] },\n          { id: \"deca-seule\", name: \"Décennale seule\", desc: \"Minimum légal obligatoire\", tag: \"Minimum légal\",\n            covers: [this.cover(\"Garantie décennale\", \"ok\"), this.cover(\"Dommages structurels 10 ans\", \"ok\"), this.cover(\"RC pro & chantier\", \"no\"), this.cover(\"Dommages aux existants\", \"no\"), this.cover(\"Protection juridique\", \"no\")] },\n          { id: \"mini\", name: \"Décennale activités limitées\", desc: \"Périmètre restreint, risqué\", warn: true,\n            covers: [this.cover(\"Décennale sur activités déclarées\", \"ok\"), this.cover(\"Travaux hors déclaration\", \"no\"), this.cover(\"RC pro & chantier\", \"no\"), this.cover(\"Dommages aux existants\", \"no\"), this.cover(\"Protection juridique\", \"no\")] },\n        ],\n        profiles: [\n          { id: \"macon\", tag: \"Profil A\", name: \"Maçon · gros œuvre\", sub: \"Fondations & structure · risque décennal maximal\",\n            factors: [\n              { t: \"Activité à fort risque\", d: \"Le gros œuvre engage la solidité de l'ouvrage : c'est l'activité la plus exposée en décennale.\" },\n              { t: \"Chiffre d'affaires\", d: \"La prime s'indexe sur le CA et le volume de chantiers réalisés.\" },\n              { t: \"Expérience & qualifications\", d: \"Ancienneté et certifications rassurent l'assureur et modèrent le tarif.\" },\n              { t: \"Sinistralité passée\", d: \"Des sinistres décennaux antérieurs alourdissent fortement la cotisation.\" },\n            ],\n            conseil: \"En gros œuvre, la décennale seule est le minimum légal, mais elle ne couvre ni votre RC de chantier ni les dommages aux existants. Une formule complète évite qu'un litige n'engloutisse votre trésorerie sur dix ans.\",\n            reco: \"complete\", prices: { complete: 320, \"deca-rc\": 260, \"deca-seule\": 210, mini: 180 } },\n          { id: \"electricien\", tag: \"Profil B\", name: \"Électricien · second œuvre\", sub: \"Installations · risque décennal modéré\",\n            factors: [\n              { t: \"Activité de second œuvre\", d: \"Le risque décennal existe (mise hors d'eau/hors d'air, normes) mais reste plus faible que le gros œuvre.\" },\n              { t: \"Déclaration exacte des activités\", d: \"Toute prestation non déclarée n'est pas couverte : le périmètre doit être complet.\" },\n              { t: \"Normes & conformité\", d: \"Le respect des normes électriques réduit le risque de sinistre et de refus de garantie.\" },\n              { t: \"Volume de chantiers\", d: \"Le nombre et la taille des chantiers ajustent la prime.\" },\n            ],\n            conseil: \"Le vrai piège en second œuvre, c'est la décennale « à activités limitées » : le moindre travail hors périmètre n'est pas couvert. Mieux vaut une décennale + RC pro couvrant l'ensemble de vos interventions réelles.\",\n            reco: \"deca-rc\", prices: { complete: 145, \"deca-rc\": 115, \"deca-seule\": 92, mini: 78 } },\n        ],\n      },\n    ];\n  }\n\n  selectAudience(a) {\n    const prod = this.products().find((p) => p.audience === a);\n    this.setState({ audience: a, productId: prod.id, personaId: prod.profiles[0].id });\n  }\n  selectProduct(id) {\n    const prod = this.products().find((p) => p.id === id);\n    this.setState({ productId: id, personaId: prod.profiles[0].id });\n  }\n  selectPersona(id) { this.setState({ personaId: id }); }\n  setPeriod(p) { this.setState({ period: p }); }\n\n  renderVals() {\n    const period = this.state.period;\n    const audience = this.state.audience;\n    const prods = this.products().filter((p) => p.audience === audience);\n    const product = prods.find((p) => p.id === this.state.productId) || prods[0];\n    const current = product.profiles.find((p) => p.id === this.state.personaId) || product.profiles[0];\n\n    const perTrip = !!product.perTrip;\n    const perEmp = !!product.perEmployee;\n    const mult = perTrip ? 1 : (period === \"mois\" ? 1 : 12);\n    let suffix;\n    if (perTrip) suffix = \"/ séjour\";\n    else if (perEmp) suffix = period === \"mois\" ? \"/ salarié · mois\" : \"/ salarié · an\";\n    else suffix = period === \"mois\" ? \"/ mois\" : \"/ an\";\n    const showPeriod = !perTrip;\n\n    const audBase = \"cursor:pointer;font-family:Arial;font-size:13px;font-weight:700;letter-spacing:.05em;padding:10px 20px;border-radius:24px;transition:all .18s;\";\n    const audienceTabs = [[\"part\", \"Particuliers\"], [\"pro\", \"Professionnels\"]].map(([k, l]) => {\n      const active = audience === k;\n      return { label: l, select: () => this.selectAudience(k),\n        style: audBase + (active\n          ? \"background:#C2A15E;color:#1B2A4D;border:1px solid #C2A15E;box-shadow:0 12px 26px -18px rgba(194,161,94,.8);\"\n          : \"background:transparent;color:#1B2A4D;border:1px solid rgba(27,42,77,.2);\") };\n    });\n\n    const prodBase = \"cursor:pointer;font-family:Arial;font-size:13px;font-weight:700;letter-spacing:.03em;padding:10px 18px;border-radius:24px;transition:all .18s;\";\n    const products = prods.map((p) => {\n      const active = p.id === this.state.productId;\n      return {\n        label: p.label, select: () => this.selectProduct(p.id),\n        style: prodBase + (active\n          ? \"background:#1B2A4D;color:#F3F1EA;border:1px solid #1B2A4D;box-shadow:0 12px 26px -18px rgba(27,42,77,.7);\"\n          : \"background:transparent;color:#1B2A4D;border:1px solid rgba(27,42,77,.2);\"),\n      };\n    });\n\n    const tabBase = \"cursor:pointer;text-align:left;padding:16px 22px;border-radius:5px;min-width:230px;flex:1;transition:all .18s;font-family:Arial;\";\n    const personas = product.profiles.map((p) => {\n      const active = p.id === this.state.personaId;\n      return {\n        tag: p.tag, name: p.name, select: () => this.selectPersona(p.id),\n        tabStyle: tabBase + (active\n          ? \"background:#1B2A4D;color:#F3F1EA;border:1px solid #1B2A4D;box-shadow:0 16px 34px -24px rgba(27,42,77,.7);\"\n          : \"background:transparent;color:#1B2A4D;border:1px solid rgba(27,42,77,.22);\"),\n        tagStyle: active ? \"color:#C2A15E;\" : \"color:#9aa1ac;\",\n      };\n    });\n\n    const pillBase = \"cursor:pointer;font-family:Arial;font-size:12px;font-weight:700;letter-spacing:.08em;padding:8px 15px;border-radius:22px;transition:all .18s;\";\n    const periodTabs = [[\"mois\", \"Mensuel\"], [\"an\", \"Annuel\"]].map(([k, l]) => {\n      const active = period === k;\n      return { label: l, select: () => this.setPeriod(k),\n        style: pillBase + (active\n          ? \"background:#1B2A4D;color:#F3F1EA;border:1px solid #1B2A4D;\"\n          : \"background:transparent;color:#6B7280;border:1px solid rgba(27,42,77,.2);\") };\n    });\n\n    const badgeCommon = \"font-family:Arial;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px 10px;border-radius:3px;text-align:center;\";\n    const cards = product.formules.map((f) => {\n      const isReco = f.id === current.reco;\n      const isWarn = !!f.warn;\n      let badge, badgeStyle;\n      if (isWarn) { badge = \"Le piège du prix\"; badgeStyle = badgeCommon + \"color:#8a6d2f;background:rgba(194,161,94,.14);border:1px dashed #C2A15E;\"; }\n      else if (isReco) { badge = \"Recommandé par Auraline\"; badgeStyle = badgeCommon + \"color:#1B2A4D;background:#C2A15E;\"; }\n      else { badge = f.tag; badgeStyle = badgeCommon + \"color:#6B7280;background:#F3F1EA;\"; }\n      return { name: f.name, desc: f.desc, covers: f.covers, isReco, isWarn, badge, badgeStyle,\n        price: this.fmt(current.prices[f.id] * mult) };\n    });\n\n    return { audienceTabs, showPeriod, products, personas, periodTabs, cards, periodSuffix: suffix,\n      current: { name: current.name, sub: current.sub, factors: current.factors, conseil: current.conseil, note: current.note } };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
